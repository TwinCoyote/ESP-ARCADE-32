name: PlatformIO & Wokwi CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio

      - name: Compilar Proyecto para ESP32
        run: pio run -e esp32dev

      - name: Instalar Wokwi CLI
        run: curl -L https://wokwi.com/ci/install.sh | sh

      - name: Validar Diagrama de Wokwi
        run: wokwi-cli lint

      - name: Ejecutar simulación en Wokwi
        run: |
          wokwi-cli --timeout 5000 --timeout-exit-code 0
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
